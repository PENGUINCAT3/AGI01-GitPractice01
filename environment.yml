name: agilab_env
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  # Python version — update to match your project's requirements
  - python=3.9
  - pip
  - ipykernel

  # Core Scientific computation
  - numpy~=2.0
  - scipy~=1.11
  - pandas~=2.1
  - matplotlib~=3.8
  
  # PyTorch & CUDA (Adjust versions based on your local GPU drivers)
  - pytorch=2.3.1
  - torchvision=0.18.1
  - torchaudio=2.3.1
  - pytorch-cuda=12.1
  # coding style


  # Development tools — kept pinned to ensure consistent CI behaviour
  - pre-commit=3.7.1
  - ruff=0.4.10
  - pytest=8.2.2
  - pytest-cov=5.0.0
  
  # Pip packages — add project-specific dependencies below
  - pip:
    # Installs the local package in editable mode (required)
    - -e .[dev]
    # Examples of common AI/research packages:
    # - transformers

